# Build-from-source override for WatchVault.
#
# Use this when you have the repository checked out and want to build the image
# locally instead of pulling the prebuilt image from GHCR:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
services:
  app:
    build: .
    pull_policy: build
