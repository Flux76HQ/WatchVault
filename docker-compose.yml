services:
  app:
    # Pulls the prebuilt image from GHCR — no source checkout needed on the host.
    # To build from source instead, add the override: `-f docker-compose.yml -f docker-compose.build.yml`.
    image: ghcr.io/helmerznl/watchvault:latest
    pull_policy: always
    env_file: .env
    ports:
      - "${WEB_PORT:-7210}:7210"   # public PWA + API + MCP (MCP served at /mcp)
    volumes:
      - ${DATA_PATH:-./data}/app:/data        # persistent app data / uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watchvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-watchvault}
    volumes:
      - ${DATA_PATH:-./data}/postgres:/var/lib/postgresql/data   # persistent DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchvault}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
